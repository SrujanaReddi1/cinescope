<!DOCTYPE html>
<html>

<head>

    <title>JNNC Submit Form</title>

    <style>

        body{
            background-color:#0b1220;
            font-family:Arial;
        }

        .box{
            background-color:#27344d;
            width:850px;
            margin:auto;
            margin-top:60px;
            padding:40px;
            border-radius:20px;
        }

        h1{
            color:#00d9ff;
            text-align:center;
            font-size:45px;
        }

        label{
            color:white;
            font-size:25px;
        }

        input{
            width:95%;
            padding:18px;
            margin-top:15px;
            margin-bottom:25px;
            border:none;
            border-radius:10px;
            font-size:18px;
        }

        button{
            background-color:#00d9ff;
            color:black;
            padding:15px;
            width:200px;
            border:none;
            border-radius:10px;
            font-size:22px;
        }

    </style>

</head>

<body>

    <div class="box">

        <h1>JNNC Submit Portal</h1>

        <br><br>

        <form>

            <label>Student Name</label>

            <br>

            <input type="text" placeholder="Enter Student Name">

            <br>

            <label>Email Address</label>

            <br>

            <input type="email" placeholder="Enter Email">

            <br>

            <label>Phone Number</label>

            <br>

            <input type="text" placeholder="Enter Phone Number">

            <br>

            <label>Date Of Birth</label>

            <br>

            <input type="date">

            <br><br>

            <center>

                <button>Submit</button>

            </center>

        </form>

    </div>

</body>

</html>
